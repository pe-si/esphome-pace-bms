
substitutions:
  name: "esp32-0x25-sensors_only-multi-pack"
  friendly_name: "esp32-0x25-sensors_only-multi-pack"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.10.0
  name_add_mac_suffix: false

  devices:
    - id: device_group_master_bms_address_1
      name: "Master BMS Address 1"
    - id: device_group_slave_bms_address_2
      name: "Slave BMS Address 2"
    - id: device_group_slave_bms_address_3
      name: "Slave BMS Address 3"
    - id: device_group_slave_bms_address_4
      name: "Slave BMS Address 4"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable logging
logger:
  # needed for C3, S2 and S3 (and possibly others) to read logs via USB, depending on framework used
  #hardware_uart: USB_CDC 

  # use INFO for production, VERY_VERBOSE for debugging or filing an issue report
  level: INFO
  #level: DEBUG
  #level: VERBOSE
  #level: VERY_VERBOSE

# Enable Home Assistant API
api:
  encryption:
   key: !secret api_encryption_key

  # disable reboot if unable to connect API
  reboot_timeout: 0min

# Allow Over-The-Air updates
ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # In conjunction with captive_portal, this spawns an AP with the device name and mac address if unable to connect
  ap: 
    password: !secret fallback_hotspot_password

    # how long to try connecting to WiFi before spawning the backup AP
    ap_timeout: 5min

  # disable reboot if unable to connect to WiFi
  reboot_timeout: 0min

# In combination with the wifi fallback AP this allows the user
# to provision wifi credentials to the device via WiFi AP.
captive_portal:

# allows access to all BMS sensors and configuration
web_server:
  version: 3

  # this would just be annoying every time, so disable ota from here instead
  #auth:
  #  username: !secret web_server_username
  #  password: !secret web_server_password  
  
  # disable firmware upload via the web server which is currently un-authenticated
  ota: false

  # don't reference external resources hosted on the net so that device webserver dashboard will continue working if internet is down
  local: true

# import the pace_bms component
external_components:
  - source:
      type: git
      url: https://github.com/nkinnan/esphome-pace-bms
      ref: "main"
    components: [ pace_bms ]
    refresh: 1s

uart:
  id: uart_1
  baud_rate: 9600 
  tx_pin: GPIO17
  rx_pin: GPIO16
  rx_buffer_size: 1024 # 256 * 4, for four battery packs in this system

pace_bms:
  - id: master_pace_bms_at_address_1
    address: 1
    uart_id: uart_1
    # needed for RS485
    flow_control_pin: GPIO4 
    update_interval: 5s
    request_throttle: 50ms 
    response_timeout: 8000ms # 2000 * 4, for four battery packs in this system

    protocol_commandset: 0x25   # example only
    # protocol_variant: "EG4"   # example only
    # protocol_version: 0x20    # example only
    # battery_chemistry: 0x4A   # example only

    type: MASTER
    slave_query_mode: BROADCAST
    rx_buffer_size: 1024 # 256 * 4, for four battery packs in this system

    device_id: device_group_master_bms_address_1 # group all sensors for this BMS under a sub-device name to avoid sensor naming collisions

  - id: slave_pace_bms_at_address_2
    address: 2
    type: SLAVE
    master_bms_id: master_pace_bms_at_address_1

    device_id: device_group_slave_bms_address_2 # group all sensors for this BMS under a sub-device name to avoid sensor naming collisions

  - id: slave_pace_bms_at_address_3
    address: 3
    type: SLAVE
    master_bms_id: master_pace_bms_at_address_1

    device_id: device_group_slave_bms_address_3 # group all sensors for this BMS under a sub-device name to avoid sensor naming collisions

  - id: slave_pace_bms_at_address_4
    address: 4
    type: SLAVE
    master_bms_id: master_pace_bms_at_address_1

    device_id: device_group_slave_bms_address_4 # group all sensors for this BMS under a sub-device name to avoid sensor naming collisions

sensor:
